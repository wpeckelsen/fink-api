# .github/workflows/ci.yml

# this workflow only triggers a build on PRs to main and pushes to main

name: Continuous Integration

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
          
      - name: Build
        run: dotnet build --configuration Release
        # Builds PR code OR merged main code
        
      # - name: Test
      #   run: dotnet test
        
        
      - name: Verify Main (Only on push to main)
        if: github.event_name == 'push'
        run: |
          echo "✅ Main branch successfully validated after merge"
          echo "This confirms Features integrated correctly"